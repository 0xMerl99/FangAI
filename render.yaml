services:
  - type: web
    name: fangai
    env: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: DEFAULT_MODEL_PROVIDER
        value: anthropic
      - key: DEFAULT_MODEL_NAME
        value: claude-3-5-sonnet-20241022
      - key: DEFAULT_MODEL_API_KEY_ENV
        value: ""
      - key: OPENFANG_ALLOW_REMOTE_WITHOUT_API_KEY
        value: "true"
