services:
  - type: web
    name: fangai
    env: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /api/health
    disk:
      name: fangai-data
      mountPath: /data
      sizeGB: 10
    envVars:
      - key: DEFAULT_MODEL_PROVIDER
        value: anthropic
      - key: DEFAULT_MODEL_NAME
        value: claude-3-5-sonnet-20241022
      - key: DEFAULT_MODEL_API_KEY_ENV
        value: ANTHROPIC_API_KEY
      - key: ANTHROPIC_API_KEY
        sync: false
